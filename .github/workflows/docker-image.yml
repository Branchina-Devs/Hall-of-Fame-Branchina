name: Docker Image Building

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # 1. Fixed the runner environment

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 2. Moved to the top (best practice)

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 # 3. Added Buildx for advanced caching/building

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Extract metadata (tags, labels) for Docker
      id: meta # 4. Added missing metadata step
      uses: docker/metadata-action@v5
      with:
        # Replace 'your-dockerhub-username' if you aren't using the var here
        images: ${{ vars.DOCKER_USERNAME }}/hof-branchina-frontend

    - name: Build and push Docker image
      uses: docker/build-push-action@v5 # 5. Handled build and push in one step
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
