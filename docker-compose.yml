services: 
  hof_frontend:
    image: ezekiel0108/hof-branchina-frontend
    container_name: hof_frontend
    restart: unless-stopped
  hof_backend:
    image: gkracket207/hof-branchina-backend
    container_name: hof_backend
    restart: unless-stopped
  db:
    image: mariadb:latest
    container_name: db
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_PW_ROOT}
      - MARIADB_DATABASE=hof_db
      - MARIADB_USER=usr
      - MARIADB_PASSWORD=${MARIADB_PW}
    ports: "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - logs:/var/log/caddy
